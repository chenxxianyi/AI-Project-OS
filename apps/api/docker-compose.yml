version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: aiproject-mysql
    environment:
      MYSQL_ROOT_PASSWORD: aiproject_dev
      MYSQL_DATABASE: ai_project_os
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: aiproject-redis
    ports:
      - "6379:6379"

volumes:
  mysqldata:
